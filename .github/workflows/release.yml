name: Build and Publish APT Repository

permissions:
  contents: write

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake build-essential libncurses-dev dpkg-dev apt-utils gnupg

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Configure GPG for CI
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          
      - name: Build project
        run: |
          mkdir build
          cd build
          cmake ..
          make
          cpack

      - name: Prepare APT repo
        run: |
          mkdir -p repo/dists/stable/main/binary-amd64
          cp build/*.deb repo/

          cd repo

          dpkg-scanpackages . /dev/null > dists/stable/main/binary-amd64/Packages
          gzip -k dists/stable/main/binary-amd64/Packages

          cd dists/stable
          apt-ftparchive release . > Release
          cd ../../..

      - name: Sign Release
        run: |
          cd repo/dists/stable

          gpg --batch --yes \
            --default-key "${{ secrets.GPG_KEY_ID }}" \
            -abs -o Release.gpg Release

          gpg --batch --yes \
            --default-key "${{ secrets.GPG_KEY_ID }}" \
            --clearsign -o InRelease Release

          cd ../../..

      - name: Generate install page
        run: |
          VERSION=$(ls build/*.deb | sed 's/.*_//' | sed 's/_amd64.deb//')

          cat <<EOF > repo/index.html
          <html>
          <head><title>ShellSweeper APT Repo</title></head>
          <body>

          <h1>ShellSweeper APT Repository</h1>

          <h2>Install</h2>

          <pre>
          curl -fsSL https://srblank.github.io/shellsweeper/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/shellsweeper.gpg
          echo "deb [signed-by=/usr/share/keyrings/shellsweeper.gpg] https://srblank.github.io/shellsweeper stable main" | sudo tee /etc/apt/sources.list.d/shellsweeper.list
          sudo apt update
          sudo apt install shellsweeper
          </pre>

          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo